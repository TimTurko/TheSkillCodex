<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" role="img" aria-labelledby="t d">
  <title id="t">Portail automatique — machine à états fautive</title>
  <desc id="d">Quatre états — Fermé, Ouverture, Ouvert, Bloqué — proprement dessinés aux coins d'un carré. Le diagramme est soigné mais comporte trois erreurs de modélisation signalées en ambre : aucun état initial n'est indiqué sur Fermé, la transition de Fermé vers Ouverture ne porte aucune condition, et l'état Bloqué n'a aucune transition de sortie. Le cycle ne revient jamais à Fermé.</desc>
  <defs>
    <style>
      .state { fill:#DDDBD3; stroke:#BA7517; stroke-width:2.5; }
      .state-t { font:700 14px sans-serif; text-anchor:middle; fill:#2C2C2A; }
      .tr { stroke:#888780; stroke-width:1.8; fill:none; marker-end:url(#ah); }
      .tr-t { font:400 12px sans-serif; fill:#2C2C2A; }
      .fault { font:700 11px sans-serif; fill:#BA7517; }
      .ttl { font:700 13px sans-serif; text-anchor:middle; fill:#2C2C2A; letter-spacing:.4px; }
      .note { font:italic 12px sans-serif; text-anchor:middle; fill:#888780; }
      .ah { fill:#888780; }
      @media (prefers-color-scheme: dark) {
        .state { fill:#4A4A48; stroke:#EF9F27; }
        .state-t { fill:#F1EFE8; }
        .tr { stroke:#BBBBBB; }
        .tr-t { fill:#F1EFE8; }
        .fault { fill:#EF9F27; }
        .ttl { fill:#F1EFE8; }
        .note { fill:#BBBBBB; }
        .ah { fill:#BBBBBB; }
      }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="ah"/>
    </marker>
  </defs>

  <text x="280" y="24" class="ttl">Portail — schéma soigné mais fautif</text>

  <rect x="50" y="60" width="150" height="56" rx="10" class="state"/>
  <text x="125" y="93" class="state-t">Fermé</text>
  <rect x="360" y="60" width="150" height="56" rx="10" class="state"/>
  <text x="435" y="93" class="state-t">Ouverture</text>
  <rect x="360" y="255" width="150" height="56" rx="10" class="state"/>
  <text x="435" y="288" class="state-t">Ouvert</text>
  <rect x="50" y="255" width="150" height="56" rx="10" class="state"/>
  <text x="125" y="288" class="state-t">Bloqué</text>

  <!-- Faute 1 : aucun état initial -->
  <text x="125" y="48" class="fault" text-anchor="middle">✗ aucun état initial</text>

  <!-- Fermé -> Ouverture : faute 2, transition sans condition -->
  <line x1="200" y1="88" x2="358" y2="88" class="tr"/>
  <text x="279" y="76" class="fault" text-anchor="middle">✗ sans événement</text>

  <!-- Ouverture -> Ouvert -->
  <line x1="435" y1="116" x2="435" y2="253" class="tr"/>
  <text x="446" y="187" class="tr-t" text-anchor="start">fin haut</text>

  <!-- Ouvert -> Bloqué -->
  <line x1="360" y1="283" x2="202" y2="283" class="tr"/>
  <text x="281" y="305" class="tr-t" text-anchor="middle">obstacle</text>

  <!-- Faute 3 : Bloqué est un puits (aucune sortie) -->
  <text x="125" y="333" class="fault" text-anchor="middle">✗ état sans sortie (puits)</text>

  <text x="300" y="363" class="note">Un schéma propre peut rester faux : trois erreurs de modélisation, et le cycle ne boucle jamais.</text>
</svg>
