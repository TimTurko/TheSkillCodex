<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" role="img" aria-labelledby="tw dw">
  <title id="tw">Technologies sans-fil — portée contre débit</title>
  <desc id="dw">Carte de positionnement des cinq technologies sans-fil courantes, selon la portée (axe horizontal, de courte à longue) et le débit (axe vertical, de bas à haut). Le Wi-Fi offre un débit élevé sur courte portée. Le BLE, une portée courte et un débit modéré, à très basse consommation. Le Zigbee et les modules XBee, une portée moyenne et un débit bas. Le LoRa, une très longue portée pour un débit très faible. La tendance générale est un compromis : plus la portée augmente, plus le débit diminue.</desc>
  <defs>
    <style>
      .ti { font: 700 16px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .axis { stroke: #888780; stroke-width: 1.6; }
      .axt { font: 700 12px sans-serif; fill: #2C2C2A; }
      .tick { font: 400 11px sans-serif; text-anchor: middle; fill: #888780; }
      .dot { fill: #BA7517; stroke: #FFFFFF; stroke-width: 1.5; }
      .dlab { font: 700 13px sans-serif; fill: #2C2C2A; }
      .trend { stroke: #888780; stroke-width: 1.4; stroke-dasharray: 6 4; fill: none; }
      .trlab { font: italic 600 11px sans-serif; fill: #888780; text-anchor: middle; }
      .foot { font: italic 400 11px sans-serif; text-anchor: middle; fill: #888780; }
      @media (prefers-color-scheme: dark) {
        .ti, .axt, .dlab { fill: #F1EFE8; }
        .axis { stroke: #BBBBBB; }
        .tick, .trlab, .foot { fill: #BBBBBB; }
        .dot { fill: #EF9F27; stroke: #2C2C2A; }
        .trend { stroke: #BBBBBB; }
      }
    </style>
    <marker id="aw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#888780"/></marker>
  </defs>

  <text x="380" y="28" class="ti">Sans-fil : portée contre débit</text>

  <!-- axes -->
  <line x1="110" y1="360" x2="110" y2="66" class="axis" marker-end="url(#aw)"/>
  <line x1="110" y1="360" x2="724" y2="360" class="axis" marker-end="url(#aw)"/>

  <!-- titres axes -->
  <text x="408" y="394" class="axt" text-anchor="middle">Portée</text>
  <text x="56" y="216" class="axt" text-anchor="middle" transform="rotate(-90 56 216)">Débit</text>
  <text x="102" y="80" class="tick" text-anchor="end">haut</text>
  <text x="102" y="356" class="tick" text-anchor="end">bas</text>
  <text x="210" y="378" class="tick">courte</text>
  <text x="420" y="378" class="tick">moyenne</text>
  <text x="650" y="378" class="tick">longue</text>

  <!-- tendance -->
  <line x1="175" y1="135" x2="675" y2="332" class="trend"/>
  <text x="470" y="180" class="trlab">compromis portée ↔ débit</text>

  <!-- points -->
  <circle cx="255" cy="120" r="8" class="dot"/><text x="270" y="124" class="dlab">Wi-Fi</text>
  <circle cx="185" cy="250" r="8" class="dot"/><text x="185" y="236" class="dlab" text-anchor="middle">BLE</text>
  <circle cx="380" cy="312" r="8" class="dot"/><text x="380" y="334" class="dlab" text-anchor="middle">Zigbee</text>
  <circle cx="478" cy="296" r="8" class="dot"/><text x="494" y="300" class="dlab">XBee</text>
  <circle cx="652" cy="338" r="8" class="dot"/><text x="652" y="322" class="dlab" text-anchor="middle">LoRa</text>

  <text x="408" y="424" class="foot">BLE, Zigbee et LoRa : très basse consommation — adaptés aux objets sur pile.</text>
</svg>
