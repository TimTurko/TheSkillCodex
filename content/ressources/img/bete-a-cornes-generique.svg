<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" role="img" aria-labelledby="title desc">
  <title id="title">Bête à cornes — schéma générique</title>
  <desc id="desc">Diagramme classique de la bête à cornes. Deux ovales en haut (l'usager à gauche, la matière d'œuvre à droite) forment les "cornes" qui descendent et se rejoignent sur le rectangle "produit ou service" au centre. Une flèche descend du produit vers le rectangle "fonction" en bas, qui répond à la question "dans quel but ?".</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font: 700 14px sans-serif; text-anchor: middle; letter-spacing: 0.5px; }
      .tq { font: 600 13px sans-serif; text-anchor: middle; }
      .tl { font: 400 12px sans-serif; text-anchor: middle; }
      .arr { stroke-width: 1.8; fill: none; }
      .horn { stroke-width: 2; fill: none; }
      .b-amber-fill { fill: #BA7517; stroke: #BA7517; stroke-width: 2; }
      .b-amber-text { fill: #FFFFFF; }
      .b-gray-fill { fill: #DDDBD3; stroke: #888780; stroke-width: 1.5; }
      .b-gray-text { fill: #2C2C2A; }
      .question-text { fill: #BA7517; }
      .neutral-stroke { stroke: #555555; }
      @media (prefers-color-scheme: dark) {
        .b-amber-fill { fill: #BA7517; stroke: #EF9F27; }
        .b-amber-text { fill: #FFFFFF; }
        .b-gray-fill { fill: #4A4A48; stroke: #BBBBBB; }
        .b-gray-text { fill: #F1EFE8; }
        .question-text { fill: #EF9F27; }
        .neutral-stroke { stroke: #BBBBBB; }
      }
    </style>
  </defs>

  <!-- Questions en haut -->
  <text x="130" y="30" class="tq question-text">À qui rend-il service ?</text>
  <text x="470" y="30" class="tq question-text">Sur quoi agit-il ?</text>

  <!-- "Cornes" : deux courbes qui descendent des ovales vers le rectangle central -->
  <!-- Corne gauche : ovale usager -> rectangle produit -->
  <path d="M 130 90 Q 130 200, 270 240" class="horn neutral-stroke"/>
  <!-- Corne droite : ovale matière -> rectangle produit -->
  <path d="M 470 90 Q 470 200, 330 240" class="horn neutral-stroke"/>

  <!-- Ovale gauche : USAGER -->
  <ellipse cx="130" cy="80" rx="110" ry="35" class="b-amber-fill"/>
  <text x="130" y="86" class="th b-amber-text">USAGER</text>

  <!-- Ovale droit : MATIÈRE D'ŒUVRE -->
  <ellipse cx="470" cy="80" rx="110" ry="35" class="b-amber-fill"/>
  <text x="470" y="86" class="th b-amber-text">MATIÈRE D'ŒUVRE</text>

  <!-- Rectangle central : PRODUIT OU SERVICE -->
  <rect x="220" y="215" width="160" height="70" rx="4" class="b-amber-fill"/>
  <text x="300" y="240" class="th b-amber-text">PRODUIT</text>
  <text x="300" y="262" class="th b-amber-text">OU SERVICE</text>

  <!-- Question "Dans quel but ?" -->
  <text x="300" y="335" class="tq question-text">Dans quel but ?</text>

  <!-- Flèche du produit vers la fonction -->
  <path d="M 300 290 L 300 355" class="arr neutral-stroke" marker-end="url(#arrow)"/>

  <!-- Rectangle fonction en bas -->
  <rect x="180" y="365" width="240" height="55" rx="4" class="b-gray-fill"/>
  <text x="300" y="400" class="th b-gray-text">FONCTION</text>
</svg>
