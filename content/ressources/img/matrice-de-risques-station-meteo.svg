<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" role="img" aria-labelledby="title desc">
  <title id="title">Matrice de risques — exemple station météo connectée</title>
  <desc id="desc">Matrice probabilité × gravité positionnant six risques concrets d'un projet de station météo connectée : panne capteur, indisponibilité fablab, complexité Wi-Fi, étanchéité boîtier, absence équipier, dérive du planning. Les risques en haut-droite (probabilité élevée et gravité élevée) appellent une parade prioritaire.</desc>
  <defs>
    <style>
      .cell-low { fill: #C8E6C9; stroke: #888780; stroke-width: 1.5; }
      .cell-mid { fill: #FFF59D; stroke: #888780; stroke-width: 1.5; }
      .cell-high { fill: #FFAB91; stroke: #888780; stroke-width: 1.5; }
      .cell-critical { fill: #E57373; stroke: #888780; stroke-width: 1.5; }
      .risk-dot { fill: #BA7517; stroke: #2C2C2A; stroke-width: 1.5; }
      .risk-num { font: 700 12px sans-serif; text-anchor: middle; fill: #FFFFFF; }
      .axis-label { font: 700 13px sans-serif; text-anchor: middle; fill: #BA7517; letter-spacing: 0.5px; }
      .level-label { font: 600 12px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .title-text { font: 700 14px sans-serif; text-anchor: middle; fill: #2C2C2A; letter-spacing: 0.5px; }
      .legend-title { font: 700 12px sans-serif; fill: #2C2C2A; }
      .legend-text { font: 400 11px sans-serif; fill: #2C2C2A; }
      @media (prefers-color-scheme: dark) {
        .cell-low { fill: #4D6F4E; stroke: #BBBBBB; }
        .cell-mid { fill: #897A30; stroke: #BBBBBB; }
        .cell-high { fill: #A56251; stroke: #BBBBBB; }
        .cell-critical { fill: #B04545; stroke: #BBBBBB; }
        .risk-dot { fill: #EF9F27; stroke: #F1EFE8; }
        .axis-label { fill: #EF9F27; }
        .level-label, .title-text, .legend-title, .legend-text { fill: #F1EFE8; }
      }
    </style>
  </defs>

  <text x="360" y="30" class="title-text">Six risques majeurs — projet station météo connectée</text>

  <!-- Axe Y -->
  <text x="50" y="235" class="axis-label" transform="rotate(-90, 50, 235)">PROBABILITÉ →</text>
  <text x="100" y="115" class="level-label">élevée</text>
  <text x="100" y="215" class="level-label">moyenne</text>
  <text x="100" y="315" class="level-label">faible</text>

  <!-- Axe X -->
  <text x="200" y="385" class="level-label">faible</text>
  <text x="320" y="385" class="level-label">moyenne</text>
  <text x="440" y="385" class="level-label">élevée</text>
  <text x="320" y="415" class="axis-label">GRAVITÉ →</text>

  <!-- Cellules colorées -->
  <rect x="150" y="75" width="100" height="80" class="cell-mid"/>
  <rect x="270" y="75" width="100" height="80" class="cell-high"/>
  <rect x="390" y="75" width="100" height="80" class="cell-critical"/>
  <rect x="150" y="175" width="100" height="80" class="cell-low"/>
  <rect x="270" y="175" width="100" height="80" class="cell-mid"/>
  <rect x="390" y="175" width="100" height="80" class="cell-high"/>
  <rect x="150" y="275" width="100" height="80" class="cell-low"/>
  <rect x="270" y="275" width="100" height="80" class="cell-low"/>
  <rect x="390" y="275" width="100" height="80" class="cell-mid"/>

  <!-- Points de risques sur la grille -->
  <!-- R1 — Indisponibilité fablab (prob. élevée, gravité moyenne) -->
  <circle cx="320" cy="115" r="14" class="risk-dot"/>
  <text x="320" y="120" class="risk-num">1</text>

  <!-- R2 — Complexité Wi-Fi (prob. moyenne, gravité élevée) -->
  <circle cx="440" cy="215" r="14" class="risk-dot"/>
  <text x="440" y="220" class="risk-num">2</text>

  <!-- R3 — Étanchéité boîtier (prob. moyenne, gravité moyenne) -->
  <circle cx="320" cy="215" r="14" class="risk-dot"/>
  <text x="320" y="220" class="risk-num">3</text>

  <!-- R4 — Absence équipier (prob. faible, gravité élevée) -->
  <circle cx="440" cy="315" r="14" class="risk-dot"/>
  <text x="440" y="320" class="risk-num">4</text>

  <!-- R5 — Panne capteur (prob. moyenne, gravité faible) -->
  <circle cx="200" cy="215" r="14" class="risk-dot"/>
  <text x="200" y="220" class="risk-num">5</text>

  <!-- R6 — Dérive planning (prob. élevée, gravité élevée) -->
  <circle cx="440" cy="115" r="14" class="risk-dot"/>
  <text x="440" y="120" class="risk-num">6</text>

  <!-- Légende -->
  <text x="50" y="450" class="legend-title">Légende :</text>
  <text x="50" y="470" class="legend-text">1. Indisponibilité fablab en période d'examens — parade : commandes critiques avant Sem. 8.</text>
  <text x="50" y="488" class="legend-text">2. Complexité de la liaison Wi-Fi — parade : plan B liaison filaire USB validé en PoC.</text>
  <text x="50" y="506" class="legend-text">3. Étanchéité boîtier insuffisante — atténuation : prototype boîtier dès Sem. 10.</text>
  <text x="380" y="470" class="legend-text">4. Absence équipier — atténuation : binômage sur les tâches critiques.</text>
  <text x="380" y="488" class="legend-text">5. Panne capteur — accepter, capteur de rechange en stock.</text>
  <text x="380" y="506" class="legend-text">6. Dérive du planning — parade : revue hebdomadaire + actualisation Gantt.</text>
</svg>
