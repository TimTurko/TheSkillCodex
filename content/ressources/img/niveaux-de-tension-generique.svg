<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 490" role="img" aria-labelledby="t1 d1">
  <title id="t1">Niveaux logiques 3,3 V et 5 V — deux incompatibilités</title>
  <desc id="d1">Deux scénarios sur une échelle de tension de 0 à 5 volts. À gauche, un composant 3,3 V envoie un « 1 » à environ 3,3 V vers l'entrée d'un composant 5 V : ce niveau reste sous le seuil VIH (environ 3,5 V) de l'entrée 5 V et tombe dans la zone indéterminée, donc n'est pas lu de façon fiable. À droite, un composant 5 V envoie un « 1 » à 5 V vers l'entrée d'un composant 3,3 V : ce niveau dépasse la tension maximale admissible (environ 3,6 V), met l'entrée en surtension et risque de la détruire. Valeurs indicatives, à lire dans la datasheet de chaque composant.</desc>
  <defs>
    <style>
      .ti { font: 700 16px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .pt { font: 700 14px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .ax { stroke: #888780; stroke-width: 1.4; }
      .tk { font: 400 10px sans-serif; text-anchor: end; fill: #888780; }
      .bar { fill: #BA7517; }
      .barlab { font: 700 13px sans-serif; text-anchor: middle; fill: #FFFFFF; }
      .hd { font: 600 11px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .zlab { font: 600 11px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .z1 { fill: #BA7517; fill-opacity: .16; }
      .z0 { fill: #DDDBD3; }
      .zu { fill: #888780; fill-opacity: .12; }
      .znorm { fill: #DDDBD3; }
      .zdan { fill: #B23A2E; fill-opacity: .16; }
      .thr { stroke: #888780; stroke-width: 1.3; stroke-dasharray: 5 3; }
      .thrlab { font: 600 10px sans-serif; text-anchor: start; fill: #888780; }
      .dan { stroke: #B23A2E; stroke-width: 1.4; stroke-dasharray: 5 3; }
      .danlab { font: 700 10px sans-serif; text-anchor: start; fill: #B23A2E; }
      .danz { font: 700 11px sans-serif; text-anchor: middle; fill: #B23A2E; }
      .arr { stroke: #BA7517; stroke-width: 2; fill: none; }
      .arrd { stroke: #B23A2E; stroke-width: 2; fill: none; }
      .note { font: 600 11px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .noted { font: 700 11px sans-serif; text-anchor: middle; fill: #B23A2E; }
      .foot { font: italic 400 11px sans-serif; text-anchor: middle; fill: #888780; }
      .divi { stroke: #888780; stroke-width: 1; stroke-dasharray: 2 4; }
      @media (prefers-color-scheme: dark) {
        .ti, .pt, .hd, .zlab { fill: #F1EFE8; }
        .ax { stroke: #BBBBBB; }
        .tk { fill: #BBBBBB; }
        .bar { fill: #EF9F27; }
        .barlab { fill: #2C2C2A; }
        .z1 { fill: #EF9F27; fill-opacity: .22; }
        .z0 { fill: #4A4A48; }
        .zu { fill: #BBBBBB; fill-opacity: .14; }
        .znorm { fill: #4A4A48; }
        .zdan { fill: #E0705F; fill-opacity: .24; }
        .thr { stroke: #BBBBBB; }
        .thrlab { fill: #BBBBBB; }
        .dan, .danlab, .danz { stroke: #E0705F; fill: #E0705F; }
        .danlab, .danz { stroke: none; }
        .arr { stroke: #EF9F27; }
        .arrd { stroke: #E0705F; }
        .note { fill: #F1EFE8; }
        .noted { fill: #E0705F; }
        .foot { fill: #BBBBBB; }
        .divi { stroke: #BBBBBB; }
      }
    </style>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#BA7517"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B23A2E"/></marker>
  </defs>

  <text x="420" y="28" class="ti">Niveaux logiques : 3,3 V et 5 V ne se parlent pas directement</text>
  <line x1="420" y1="58" x2="420" y2="412" class="divi"/>

  <!-- ============ PANNEAU GAUCHE : 3,3 V -> 5 V ============ -->
  <text x="225" y="76" class="pt">3,3 V → 5 V</text>

  <line x1="120" y1="95" x2="120" y2="410" class="ax"/>
  <line x1="114" y1="410" x2="120" y2="410" class="ax"/><text x="110" y="414" class="tk">0 V</text>
  <line x1="114" y1="347" x2="120" y2="347" class="ax"/><text x="110" y="351" class="tk">1 V</text>
  <line x1="114" y1="284" x2="120" y2="284" class="ax"/><text x="110" y="288" class="tk">2 V</text>
  <line x1="114" y1="221" x2="120" y2="221" class="ax"/><text x="110" y="225" class="tk">3 V</text>
  <line x1="114" y1="158" x2="120" y2="158" class="ax"/><text x="110" y="162" class="tk">4 V</text>
  <line x1="114" y1="95" x2="120" y2="95" class="ax"/><text x="110" y="99" class="tk">5 V</text>

  <text x="168" y="89" class="hd">sortie 3,3 V</text>
  <text x="296" y="89" class="hd">entrée 5 V</text>

  <!-- sortie '1' du composant 3,3 V -->
  <rect x="140" y="202" width="56" height="208" rx="3" class="bar"/>
  <text x="168" y="312" class="barlab">3,3 V</text>

  <!-- bandes d'une entrée 5 V -->
  <rect x="250" y="95" width="92" height="94.5" class="z1"/>
  <text x="296" y="147" class="zlab">lu « 1 »</text>
  <rect x="250" y="189.5" width="92" height="126" class="zu"/>
  <text x="296" y="257" class="zlab">indéterminé</text>
  <rect x="250" y="315.5" width="92" height="94.5" class="z0"/>
  <text x="296" y="367" class="zlab">lu « 0 »</text>

  <line x1="246" y1="189.5" x2="346" y2="189.5" class="thr"/><text x="349" y="186" class="thrlab">VIH ≈ 3,5 V</text>
  <line x1="246" y1="315.5" x2="346" y2="315.5" class="thr"/><text x="349" y="312" class="thrlab">VIL ≈ 1,5 V</text>

  <line x1="196" y1="202" x2="246" y2="202" class="arr" marker-end="url(#a1)"/>

  <text x="225" y="436" class="note">Un « 1 » à 3,3 V reste sous le seuil VIH d'une</text>
  <text x="225" y="451" class="note">entrée 5 V → il n'est pas lu de façon fiable.</text>

  <!-- ============ PANNEAU DROIT : 5 V -> 3,3 V ============ -->
  <text x="628" y="76" class="pt">5 V → 3,3 V</text>

  <line x1="520" y1="95" x2="520" y2="410" class="ax"/>
  <line x1="514" y1="410" x2="520" y2="410" class="ax"/><text x="510" y="414" class="tk">0 V</text>
  <line x1="514" y1="347" x2="520" y2="347" class="ax"/><text x="510" y="351" class="tk">1 V</text>
  <line x1="514" y1="284" x2="520" y2="284" class="ax"/><text x="510" y="288" class="tk">2 V</text>
  <line x1="514" y1="221" x2="520" y2="221" class="ax"/><text x="510" y="225" class="tk">3 V</text>
  <line x1="514" y1="158" x2="520" y2="158" class="ax"/><text x="510" y="162" class="tk">4 V</text>
  <line x1="514" y1="95" x2="520" y2="95" class="ax"/><text x="510" y="99" class="tk">5 V</text>

  <text x="568" y="89" class="hd">sortie 5 V</text>
  <text x="696" y="89" class="hd">entrée 3,3 V</text>

  <!-- sortie '1' du composant 5 V -->
  <rect x="540" y="95" width="56" height="315" rx="3" class="bar"/>
  <text x="568" y="258" class="barlab">5 V</text>

  <!-- entrée 3,3 V : zone tolérée + zone destruction -->
  <rect x="650" y="183" width="92" height="227" class="znorm"/>
  <text x="696" y="320" class="zlab">toléré</text>
  <rect x="650" y="95" width="92" height="88" class="zdan"/>
  <text x="696" y="143" class="danz">destruction</text>

  <line x1="646" y1="183" x2="746" y2="183" class="dan"/><text x="749" y="180" class="danlab">max ≈ 3,6 V</text>

  <line x1="596" y1="124" x2="646" y2="142" class="arrd" marker-end="url(#a2)"/>

  <text x="628" y="436" class="noted">Un « 1 » à 5 V dépasse la tension maximale d'une</text>
  <text x="628" y="451" class="noted">entrée 3,3 V → surtension, risque de destruction.</text>

  <text x="420" y="478" class="foot">Valeurs indicatives — les seuils exacts (VIH, VIL, VOH, VOL, tension maximale) se lisent dans la datasheet de chaque composant.</text>
</svg>
