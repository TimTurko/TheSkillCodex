<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" role="img" aria-labelledby="title desc">
  <title id="title">FAST — schéma générique</title>
  <desc id="desc">Diagramme FAST générique lu de gauche à droite. À gauche, une fonction à réaliser. Au centre, deux fonctions techniques empilées verticalement (axe QUAND, simultanéité). À droite, les solutions candidates qui réalisent chaque fonction technique. Axe horizontal : COMMENT de gauche à droite, POURQUOI de droite à gauche.</desc>
  <defs>
    <style>
      .conn { stroke: #888780; stroke-width: 1.8; fill: none; }
      .quand { stroke: #BA7517; stroke-width: 1.4; stroke-dasharray: 4 3; fill: none; }
      .arrow { fill: #BA7517; }
      .n1-fill { fill: #BA7517; stroke: #BA7517; stroke-width: 2; }
      .n1-text { font: 700 14px sans-serif; text-anchor: middle; fill: #FFFFFF; }
      .n2-fill { fill: #DDDBD3; stroke: #888780; stroke-width: 1.5; }
      .n2-text { font: 700 12px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .n3-fill { fill: #FFFFFF; stroke: #888780; stroke-width: 1.2; }
      .n3-text { font: 400 11px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .axis-text { font: 600 12px sans-serif; fill: #BA7517; text-anchor: middle; letter-spacing: 0.4px; }
      .title-text { font: 700 14px sans-serif; text-anchor: middle; fill: #2C2C2A; letter-spacing: 0.5px; }
      .foot { font: italic 400 11px sans-serif; fill: #888780; text-anchor: middle; }
      @media (prefers-color-scheme: dark) {
        .conn { stroke: #BBBBBB; }
        .n1-fill { fill: #BA7517; stroke: #EF9F27; }
        .n2-fill { fill: #4A4A48; stroke: #BBBBBB; }
        .n2-text { fill: #F1EFE8; }
        .n3-fill { fill: #2C2C2A; stroke: #BBBBBB; }
        .n3-text { fill: #F1EFE8; }
        .axis-text { fill: #EF9F27; }
        .quand { stroke: #EF9F27; }
        .arrow { fill: #EF9F27; }
        .title-text { fill: #F1EFE8; }
      }
    </style>
  </defs>

  <text x="410" y="28" class="title-text">FAST — chaîne logique POURQUOI / COMMENT / QUAND</text>

  <!-- Axe horizontal POURQUOI / COMMENT -->
  <text x="240" y="54" class="axis-text">POURQUOI ?</text>
  <text x="600" y="54" class="axis-text">COMMENT ?</text>
  <line x1="135" y1="66" x2="710" y2="66" class="conn"/>
  <polygon points="125,66 138,60 138,72" class="arrow"/>
  <polygon points="720,66 707,60 707,72" class="arrow"/>

  <!-- Fonction (racine) -->
  <rect x="40" y="148" width="180" height="84" rx="6" class="n1-fill"/>
  <text x="130" y="183" class="n1-text">Fonction</text>
  <text x="130" y="203" class="n1-text">à réaliser</text>

  <!-- Axe vertical QUAND -->
  <line x1="300" y1="138" x2="300" y2="252" class="quand"/>
  <text transform="rotate(-90 296 195)" x="296" y="195" class="axis-text">QUAND ? — simultané</text>

  <!-- Fonctions techniques -->
  <rect x="322" y="120" width="190" height="55" rx="5" class="n2-fill"/>
  <text x="417" y="152" class="n2-text">Fonction technique 1</text>
  <rect x="322" y="215" width="190" height="55" rx="5" class="n2-fill"/>
  <text x="417" y="247" class="n2-text">Fonction technique 2</text>

  <!-- Solutions -->
  <rect x="610" y="110" width="170" height="38" rx="4" class="n3-fill"/>
  <text x="695" y="133" class="n3-text">Solution a</text>
  <rect x="610" y="158" width="170" height="38" rx="4" class="n3-fill"/>
  <text x="695" y="181" class="n3-text">Solution b</text>
  <rect x="610" y="228" width="170" height="38" rx="4" class="n3-fill"/>
  <text x="695" y="251" class="n3-text">Solution c</text>

  <!-- Liaisons Fonction -> FT -->
  <line x1="220" y1="190" x2="322" y2="147" class="conn"/>
  <line x1="220" y1="190" x2="322" y2="242" class="conn"/>
  <!-- Liaisons FT1 -> solutions -->
  <line x1="512" y1="147" x2="610" y2="129" class="conn"/>
  <line x1="512" y1="147" x2="610" y2="177" class="conn"/>
  <!-- Liaison FT2 -> solution -->
  <line x1="512" y1="242" x2="610" y2="247" class="conn"/>

  <text x="410" y="340" class="foot">Lecture : COMMENT de gauche à droite, POURQUOI de droite à gauche.</text>
  <text x="410" y="362" class="foot">La chaîne est valide si elle se lit juste dans les deux sens.</text>
  <text x="410" y="384" class="foot">L'axe vertical (QUAND) regroupe les fonctions assurées simultanément.</text>
</svg>
