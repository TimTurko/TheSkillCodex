<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" role="img" aria-labelledby="title desc">
  <title id="title">WBS — schéma générique</title>
  <desc id="desc">Arbre de décomposition WBS sur trois niveaux. À la racine, un rectangle ambre représentant le projet. Trois enfants représentant les sous-livrables principaux. Sous chaque sous-livrable, trois petits-enfants représentant les tâches élémentaires.</desc>
  <defs>
    <style>
      .conn { stroke: #888780; stroke-width: 1.8; fill: none; }
      .n1-fill { fill: #BA7517; stroke: #BA7517; stroke-width: 2; }
      .n1-text { font: 700 14px sans-serif; text-anchor: middle; fill: #FFFFFF; letter-spacing: 0.3px; }
      .n2-fill { fill: #DDDBD3; stroke: #888780; stroke-width: 1.5; }
      .n2-text { font: 700 12px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .n3-fill { fill: #FFFFFF; stroke: #888780; stroke-width: 1.2; }
      .n3-text { font: 400 11px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .niveau-label { font: 600 11px sans-serif; fill: #BA7517; letter-spacing: 0.5px; }
      .title-text { font: 700 14px sans-serif; text-anchor: middle; fill: #2C2C2A; letter-spacing: 0.5px; }
      @media (prefers-color-scheme: dark) {
        .conn { stroke: #BBBBBB; }
        .n1-fill { fill: #BA7517; stroke: #EF9F27; }
        .n2-fill { fill: #4A4A48; stroke: #BBBBBB; }
        .n2-text { fill: #F1EFE8; }
        .n3-fill { fill: #2C2C2A; stroke: #BBBBBB; }
        .n3-text { fill: #F1EFE8; }
        .niveau-label { fill: #EF9F27; }
        .title-text { fill: #F1EFE8; }
      }
    </style>
  </defs>

  <text x="380" y="30" class="title-text">Arbre de décomposition WBS — trois niveaux</text>

  <!-- Niveaux (labels à gauche) -->
  <text x="10" y="80" class="niveau-label">Niveau 1</text>
  <text x="10" y="200" class="niveau-label">Niveau 2</text>
  <text x="10" y="345" class="niveau-label">Niveau 3</text>

  <!-- Racine -->
  <rect x="290" y="60" width="180" height="50" rx="6" class="n1-fill"/>
  <text x="380" y="90" class="n1-text">Projet (livrable global)</text>

  <!-- Liaisons N1 → N2 -->
  <line x1="380" y1="110" x2="380" y2="135" class="conn"/>
  <line x1="140" y1="135" x2="620" y2="135" class="conn"/>
  <line x1="140" y1="135" x2="140" y2="170" class="conn"/>
  <line x1="380" y1="135" x2="380" y2="170" class="conn"/>
  <line x1="620" y1="135" x2="620" y2="170" class="conn"/>

  <!-- N2 — Sous-livrable A -->
  <rect x="60" y="170" width="160" height="50" rx="5" class="n2-fill"/>
  <text x="140" y="200" class="n2-text">Sous-livrable A</text>

  <!-- N2 — Sous-livrable B -->
  <rect x="300" y="170" width="160" height="50" rx="5" class="n2-fill"/>
  <text x="380" y="200" class="n2-text">Sous-livrable B</text>

  <!-- N2 — Sous-livrable C -->
  <rect x="540" y="170" width="160" height="50" rx="5" class="n2-fill"/>
  <text x="620" y="200" class="n2-text">Sous-livrable C</text>

  <!-- Liaisons N2 → N3 (A) -->
  <line x1="140" y1="220" x2="140" y2="250" class="conn"/>
  <line x1="85" y1="250" x2="195" y2="250" class="conn"/>
  <line x1="85" y1="250" x2="85" y2="290" class="conn"/>
  <line x1="140" y1="250" x2="140" y2="290" class="conn"/>
  <line x1="195" y1="250" x2="195" y2="290" class="conn"/>

  <!-- Liaisons N2 → N3 (B) -->
  <line x1="380" y1="220" x2="380" y2="250" class="conn"/>
  <line x1="325" y1="250" x2="435" y2="250" class="conn"/>
  <line x1="325" y1="250" x2="325" y2="290" class="conn"/>
  <line x1="380" y1="250" x2="380" y2="290" class="conn"/>
  <line x1="435" y1="250" x2="435" y2="290" class="conn"/>

  <!-- Liaisons N2 → N3 (C) -->
  <line x1="620" y1="220" x2="620" y2="250" class="conn"/>
  <line x1="565" y1="250" x2="675" y2="250" class="conn"/>
  <line x1="565" y1="250" x2="565" y2="290" class="conn"/>
  <line x1="620" y1="250" x2="620" y2="290" class="conn"/>
  <line x1="675" y1="250" x2="675" y2="290" class="conn"/>

  <!-- N3 — Tâches sous A -->
  <rect x="40" y="290" width="90" height="40" rx="4" class="n3-fill"/>
  <text x="85" y="315" class="n3-text">Tâche A.1</text>
  <rect x="95" y="290" width="90" height="40" rx="4" class="n3-fill"/>
  <text x="140" y="315" class="n3-text">Tâche A.2</text>
  <rect x="150" y="290" width="90" height="40" rx="4" class="n3-fill"/>
  <text x="195" y="315" class="n3-text">Tâche A.3</text>

  <!-- N3 — Tâches sous B -->
  <rect x="280" y="290" width="90" height="40" rx="4" class="n3-fill"/>
  <text x="325" y="315" class="n3-text">Tâche B.1</text>
  <rect x="335" y="290" width="90" height="40" rx="4" class="n3-fill"/>
  <text x="380" y="315" class="n3-text">Tâche B.2</text>
  <rect x="390" y="290" width="90" height="40" rx="4" class="n3-fill"/>
  <text x="435" y="315" class="n3-text">Tâche B.3</text>

  <!-- N3 — Tâches sous C -->
  <rect x="520" y="290" width="90" height="40" rx="4" class="n3-fill"/>
  <text x="565" y="315" class="n3-text">Tâche C.1</text>
  <rect x="575" y="290" width="90" height="40" rx="4" class="n3-fill"/>
  <text x="620" y="315" class="n3-text">Tâche C.2</text>
  <rect x="630" y="290" width="90" height="40" rx="4" class="n3-fill"/>
  <text x="675" y="315" class="n3-text">Tâche C.3</text>

  <text x="380" y="430" class="n3-text" style="font-style:italic;fill:#888780">Granularité cible : 2 à 3 niveaux suffisent en projet école.</text>
</svg>
