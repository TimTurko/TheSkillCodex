<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" role="img" aria-labelledby="title desc">
  <title id="title">Décomposition fonctionnelle — bon exemple bras 3 axes</title>
  <desc id="desc">Découpage du bras 3 axes en trois sous-systèmes fonctionnels équilibrés : mobilité articulaire avec quatre fonctions techniques (générer un couple, mesurer la position, asservir, synchroniser), interface utilisateur avec deux fonctions (recevoir la consigne, afficher l'état), alimentation et sécurité avec trois fonctions (fournir l'énergie, surveiller, arrêter en cas d'incident). Chaque sous-système mobilise élec, méca et info.</desc>
  <defs>
    <style>
      .conn { stroke: #888780; stroke-width: 1.8; fill: none; }
      .n1-fill { fill: #BA7517; stroke: #BA7517; stroke-width: 2; }
      .n1-text { font: 700 14px sans-serif; text-anchor: middle; fill: #FFFFFF; letter-spacing: 0.3px; }
      .n2-fill { fill: #DDDBD3; stroke: #888780; stroke-width: 1.5; }
      .n2-text { font: 700 12px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .n3-fill { fill: #FFFFFF; stroke: #888780; stroke-width: 1.2; }
      .n3-text { font: 400 10px sans-serif; text-anchor: middle; fill: #2C2C2A; }
      .niveau-label { font: 600 11px sans-serif; fill: #BA7517; letter-spacing: 0.5px; }
      .title-text { font: 700 14px sans-serif; text-anchor: middle; fill: #2C2C2A; letter-spacing: 0.5px; }
      @media (prefers-color-scheme: dark) {
        .conn { stroke: #BBBBBB; }
        .n1-fill { fill: #BA7517; stroke: #EF9F27; }
        .n2-fill { fill: #4A4A48; stroke: #BBBBBB; }
        .n2-text { fill: #F1EFE8; }
        .n3-fill { fill: #2C2C2A; stroke: #BBBBBB; }
        .n3-text { fill: #F1EFE8; }
        .niveau-label { fill: #EF9F27; }
        .title-text { fill: #F1EFE8; }
      }
    </style>
  </defs>

  <text x="460" y="30" class="title-text">Bras 3 axes — découpage fonctionnel équilibré</text>

  <text x="10" y="90" class="niveau-label">Système</text>
  <text x="10" y="200" class="niveau-label">Sous-systèmes</text>
  <text x="10" y="320" class="niveau-label">Fonctions techniques</text>

  <!-- Racine -->
  <rect x="360" y="60" width="200" height="50" rx="6" class="n1-fill"/>
  <text x="460" y="90" class="n1-text">Bras 3 axes</text>

  <!-- Liaisons N1 → N2 -->
  <line x1="460" y1="110" x2="460" y2="135" class="conn"/>
  <line x1="130" y1="135" x2="680" y2="135" class="conn"/>
  <line x1="130" y1="135" x2="130" y2="170" class="conn"/>
  <line x1="400" y1="135" x2="400" y2="170" class="conn"/>
  <line x1="680" y1="135" x2="680" y2="170" class="conn"/>

  <!-- N2 -->
  <rect x="20" y="170" width="220" height="50" rx="5" class="n2-fill"/>
  <text x="130" y="200" class="n2-text">Mobilité articulaire</text>

  <rect x="300" y="170" width="200" height="50" rx="5" class="n2-fill"/>
  <text x="400" y="200" class="n2-text">Interface utilisateur</text>

  <rect x="560" y="170" width="240" height="50" rx="5" class="n2-fill"/>
  <text x="680" y="200" class="n2-text">Alimentation et sécurité</text>

  <!-- Liaisons N2 → N3 (Mobilité, 4 leaves) -->
  <line x1="130" y1="220" x2="130" y2="250" class="conn"/>
  <line x1="35" y1="250" x2="245" y2="250" class="conn"/>
  <line x1="35" y1="250" x2="35" y2="290" class="conn"/>
  <line x1="105" y1="250" x2="105" y2="290" class="conn"/>
  <line x1="175" y1="250" x2="175" y2="290" class="conn"/>
  <line x1="245" y1="250" x2="245" y2="290" class="conn"/>

  <!-- Liaisons N2 → N3 (Interface, 2 leaves) -->
  <line x1="400" y1="220" x2="400" y2="250" class="conn"/>
  <line x1="355" y1="250" x2="450" y2="250" class="conn"/>
  <line x1="355" y1="250" x2="355" y2="290" class="conn"/>
  <line x1="450" y1="250" x2="450" y2="290" class="conn"/>

  <!-- Liaisons N2 → N3 (Alimentation, 3 leaves) -->
  <line x1="680" y1="220" x2="680" y2="250" class="conn"/>
  <line x1="595" y1="250" x2="765" y2="250" class="conn"/>
  <line x1="595" y1="250" x2="595" y2="290" class="conn"/>
  <line x1="680" y1="250" x2="680" y2="290" class="conn"/>
  <line x1="765" y1="250" x2="765" y2="290" class="conn"/>

  <!-- N3 — Mobilité articulaire -->
  <rect x="0" y="290" width="70" height="40" rx="4" class="n3-fill"/>
  <text x="35" y="315" class="n3-text">Générer couple</text>
  <rect x="70" y="290" width="70" height="40" rx="4" class="n3-fill"/>
  <text x="105" y="315" class="n3-text">Mesurer position</text>
  <rect x="140" y="290" width="70" height="40" rx="4" class="n3-fill"/>
  <text x="175" y="315" class="n3-text">Asservir</text>
  <rect x="210" y="290" width="70" height="40" rx="4" class="n3-fill"/>
  <text x="245" y="315" class="n3-text">Synchroniser</text>

  <!-- N3 — Interface utilisateur -->
  <rect x="310" y="290" width="90" height="40" rx="4" class="n3-fill"/>
  <text x="355" y="315" class="n3-text">Recevoir consigne</text>
  <rect x="405" y="290" width="90" height="40" rx="4" class="n3-fill"/>
  <text x="450" y="315" class="n3-text">Afficher état</text>

  <!-- N3 — Alimentation et sécurité -->
  <rect x="555" y="290" width="80" height="40" rx="4" class="n3-fill"/>
  <text x="595" y="315" class="n3-text">Fournir énergie</text>
  <rect x="640" y="290" width="80" height="40" rx="4" class="n3-fill"/>
  <text x="680" y="315" class="n3-text">Surveiller</text>
  <rect x="725" y="290" width="80" height="40" rx="4" class="n3-fill"/>
  <text x="765" y="315" class="n3-text">Arrêter</text>

  <text x="460" y="400" class="n3-text" style="font-style:italic;fill:#888780">Tailles comparables. Interfaces nettes. Chaque sous-système mobilise élec, méca et info.</text>
  <text x="460" y="430" class="n3-text" style="font-style:italic;fill:#888780">Chaque FT est directement adressable par 2 à 5 solutions candidates en matrice de décision.</text>
</svg>
