<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" role="img" aria-labelledby="title desc">
  <title id="title">Bête à cornes — exemple bon (bras robotique)</title>
  <desc id="desc">Exemple bon de bête à cornes pour le projet de bras robotique pédagogique. Usager : "Étudiants en école d'ingénieur découvrant la robotique". Matière d'œuvre : "Apprentissage de la cinématique des bras manipulateurs 6 axes". Fonction : "Visualiser et manipuler concrètement les repères articulaires, transformations géométriques et trajectoires". Formulations précises, évaluables, sans choix de solution.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font: 700 13px sans-serif; text-anchor: middle; letter-spacing: 0.3px; }
      .ts { font: 600 11.5px sans-serif; text-anchor: middle; }
      .tq { font: 600 13px sans-serif; text-anchor: middle; }
      .arr { stroke-width: 1.8; fill: none; }
      .horn { stroke-width: 2; fill: none; }
      .b-amber-fill { fill: #BA7517; stroke: #BA7517; stroke-width: 2; }
      .b-amber-text { fill: #FFFFFF; }
      .b-gray-fill { fill: #DDDBD3; stroke: #888780; stroke-width: 1.5; }
      .b-gray-text { fill: #2C2C2A; }
      .question-text { fill: #BA7517; }
      .neutral-stroke { stroke: #555555; }
      @media (prefers-color-scheme: dark) {
        .b-amber-fill { fill: #BA7517; stroke: #EF9F27; }
        .b-amber-text { fill: #FFFFFF; }
        .b-gray-fill { fill: #4A4A48; stroke: #BBBBBB; }
        .b-gray-text { fill: #F1EFE8; }
        .question-text { fill: #EF9F27; }
        .neutral-stroke { stroke: #BBBBBB; }
      }
    </style>
  </defs>

  <text x="130" y="30" class="tq question-text">À qui rend-il service ?</text>
  <text x="470" y="30" class="tq question-text">Sur quoi agit-il ?</text>

  <path d="M 130 100 Q 130 215, 270 255" class="horn neutral-stroke"/>
  <path d="M 470 100 Q 470 215, 330 255" class="horn neutral-stroke"/>

  <ellipse cx="130" cy="80" rx="125" ry="48" class="b-amber-fill"/>
  <text x="130" y="68" class="ts b-amber-text">ÉTUDIANTS EN</text>
  <text x="130" y="84" class="ts b-amber-text">ÉCOLE D'INGÉNIEUR</text>
  <text x="130" y="100" class="ts b-amber-text">DÉCOUVRANT LA ROBOTIQUE</text>

  <ellipse cx="470" cy="80" rx="125" ry="48" class="b-amber-fill"/>
  <text x="470" y="64" class="ts b-amber-text">APPRENTISSAGE DE LA</text>
  <text x="470" y="80" class="ts b-amber-text">CINÉMATIQUE DES BRAS</text>
  <text x="470" y="96" class="ts b-amber-text">MANIPULATEURS 6 AXES</text>

  <rect x="220" y="230" width="160" height="70" rx="4" class="b-amber-fill"/>
  <text x="300" y="255" class="th b-amber-text">BRAS ROBOTIQUE</text>
  <text x="300" y="277" class="ts b-amber-text">PÉDAGOGIQUE 6 AXES</text>

  <text x="300" y="350" class="tq question-text">Dans quel but ?</text>

  <path d="M 300 305 L 300 370" class="arr neutral-stroke" marker-end="url(#arrow)"/>

  <rect x="40" y="380" width="520" height="80" rx="4" class="b-gray-fill"/>
  <text x="300" y="406" class="ts b-gray-text">VISUALISER ET MANIPULER CONCRÈTEMENT</text>
  <text x="300" y="424" class="ts b-gray-text">LES REPÈRES ARTICULAIRES,</text>
  <text x="300" y="442" class="ts b-gray-text">TRANSFORMATIONS GÉOMÉTRIQUES ET TRAJECTOIRES</text>
</svg>
