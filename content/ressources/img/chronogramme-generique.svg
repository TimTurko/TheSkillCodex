<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 350" role="img" aria-labelledby="t d">
  <title id="t">Chronogramme — axe de temps et signaux</title>
  <desc id="d">Chronogramme à trois signaux logiques empilés sur un axe de temps commun horizontal orienté vers la droite. Une horloge périodique en haut, avec sa période repérée par une cote en ambre et ses niveaux 1 et 0. Un signal A présentant un front montant et un front descendant repérés en ambre. Un signal B qui réagit au front montant de A après un léger délai. Une ligne pointillée verticale relie un instant commun.</desc>
  <defs>
    <style>
      .sig { stroke:#2C2C2A; stroke-width:2.2; fill:none; }
      .axis { stroke:#888780; stroke-width:1.6; fill:none; marker-end:url(#ah); }
      .lbl { font:600 12px sans-serif; text-anchor:end; fill:#2C2C2A; }
      .lvl { font:400 10px sans-serif; text-anchor:end; fill:#888780; }
      .ann { font:700 11px sans-serif; fill:#BA7517; }
      .dim { stroke:#BA7517; stroke-width:1.4; fill:none; marker-start:url(#ahg); marker-end:url(#ahg); }
      .dash { stroke:#888780; stroke-width:1.2; fill:none; stroke-dasharray:4 3; }
      .ttl { font:700 13px sans-serif; text-anchor:middle; fill:#2C2C2A; letter-spacing:.4px; }
      .note { font:italic 11.5px sans-serif; text-anchor:middle; fill:#888780; }
      .ah { fill:#888780; }
      .ahg { fill:#BA7517; }
      @media (prefers-color-scheme: dark) {
        .sig { stroke:#F1EFE8; }
        .axis { stroke:#BBBBBB; }
        .lbl { fill:#F1EFE8; }
        .lvl { fill:#BBBBBB; }
        .ann { fill:#EF9F27; }
        .dim { stroke:#EF9F27; }
        .dash { stroke:#BBBBBB; }
        .ttl { fill:#F1EFE8; }
        .note { fill:#BBBBBB; }
        .ah { fill:#BBBBBB; }
        .ahg { fill:#EF9F27; }
      }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="ah"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="ahg"/>
    </marker>
  </defs>

  <text x="310" y="22" class="ttl">Chronogramme — niveaux et fronts sur un axe commun</text>

  <!-- Cote de période (horloge) -->
  <line x1="90" y1="46" x2="170" y2="46" class="dim"/>
  <text x="124" y="42" class="ann">période</text>

  <!-- Horloge -->
  <text x="80" y="90" class="lbl">Horloge</text>
  <text x="80" y="76" class="lvl">1</text>
  <text x="80" y="106" class="lvl">0</text>
  <polyline points="90,70 130,70 130,100 170,100 170,70 210,70 210,100 250,100 250,70 290,70 290,100 330,100 330,70 370,70 370,100 410,100 410,70 450,70 450,100 490,100 490,70 530,70 530,100 560,100" class="sig"/>

  <!-- Signal A -->
  <text x="80" y="170" class="lbl">Signal A</text>
  <polyline points="90,180 210,180 210,150 410,150 410,180 560,180" class="sig"/>
  <text x="214" y="143" class="ann">↑ front montant</text>
  <text x="406" y="143" class="ann" text-anchor="end">front descendant ↓</text>

  <!-- Signal B -->
  <text x="80" y="250" class="lbl">Signal B</text>
  <polyline points="90,260 250,260 250,230 450,230 450,260 560,260" class="sig"/>

  <!-- Alignement temporel A -> B -->
  <line x1="210" y1="150" x2="210" y2="275" class="dash"/>
  <line x1="250" y1="230" x2="250" y2="275" class="dash"/>
  <line x1="210" y1="272" x2="250" y2="272" class="dim"/>
  <text x="256" y="276" class="ann">délai</text>

  <!-- Axe de temps -->
  <line x1="90" y1="300" x2="585" y2="300" class="axis"/>
  <text x="592" y="304" class="lbl" text-anchor="start" style="fill:#888780">t</text>

  <text x="310" y="332" class="note">On lit le niveau et les fronts de chaque signal au même instant sur l'axe commun.</text>
</svg>
